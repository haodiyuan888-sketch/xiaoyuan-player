        });
        Array.prototype.forEach.call($('workspacePanel').querySelectorAll('.remove-pl-song'), function (btn) {
          btn.addEventListener('click', function (e) {
            e.stopPropagation();
            var row = btn.closest('.chart-song');
            var songIdx = Number(row.dataset.plSongIdx);
            var playlists = load('xym_playlists') || [];
            var pl = playlists[idx];
            if (!pl) return;
            var removed = pl.songs[songIdx];
            pl.songs.splice(songIdx, 1);
            save('xym_playlists', playlists);
            toast('已移除：' + (removed ? removed.name : ''));
            renderPlaylistDetail(idx, pl);
          });
        });
      }

      // ---- 下载管理 ----
      function renderDownloads() {
        $('workspacePanel').hidden = false;
        var downloads = load('xym_downloads') || [];
        var html = '<div class="page-header"><div class="page-header-icon" style="background:rgba(46,204,113,.13);color:#2ecc71">⇩</div><div><h2>下载管理</h2><p>' + downloads.length + ' 条下载记录</p></div>';
        if (downloads.length) html += '<button class="clear-btn" id="clearDlBtn" type="button" style="margin-left:auto;">清空记录</button>';
        html += '</div>';
        if (!downloads.length) {
          html += '<div class="panel" style="text-align:center;padding:50px 20px;color:var(--desk-muted);"><div style="font-size:56px;margin-bottom:12px;opacity:.45;">⇩</div><strong>暂无下载记录</strong><br>在歌曲列表中点击下载按钮，下载记录会显示在这里</div>';
        } else {
          html += '<div class="panel" style="padding:12px;"><div class="dl-list">';
          downloads.forEach(function (dl) {
            var done = dl.status === 'done';
            html += '<div class="dl-item">';
            html += '<div class="dl-icon-wrap ' + (done ? 'done' : 'pending') + '">' + (done ? '✓' : '⏳') + '</div>';
            html += '<div><div class="dl-name">' + escapeHtml(dl.name || '未知歌曲') + '</div><div class="dl-meta">' + escapeHtml(dl.artist || '') + ' · ' + (dl.quality || 'HQ') + '</div></div>';
            html += '<span class="dl-status" style="' + (done ? '' : 'color:#f1c40f;background:rgba(241,196,15,.1);') + '">' + (done ? '已完成' : '下载中') + '</span>';
            html += '</div>';
          });
          html += '</div></div>';
        }
        $('workspacePanel').innerHTML = html;
        var clearBtn = $('clearDlBtn');
        if (clearBtn) {
          clearBtn.addEventListener('click', function () {
            save('xym_downloads', []);
            renderDownloads();
            toast('下载记录已清空');
          });
        }
      }

      $('sideNav').addEventListener('click', function (event) {
        var button = event.target.closest('.side-link[data-page]');
        if (button) setWorkspace(button.dataset.page);
      });
      document.querySelector('.side-footer').addEventListener('click', function (event) {
        var button = event.target.closest('.side-link[data-page]');
        if (button) setWorkspace(button.dataset.page);
      });
      $('heroPlay').addEventListener('click', function () {
        if (!state.quickSongs || !state.quickSongs.length) { toast('推荐歌曲仍在加载'); return; }
        state.songs = state.quickSongs;
        playAt(Math.floor(Math.random() * state.quickSongs.length));
      });
      var searchHints = ['搜索歌曲、歌手、专辑', '试试：周杰伦', '试试：热门新歌', '搜索你的心动旋律'];
      var searchHintIndex = 0;
      setInterval(function () {
        if (document.activeElement !== $('keyword')) {
          searchHintIndex = (searchHintIndex + 1) % searchHints.length;
          $('keyword').placeholder = searchHints[searchHintIndex];
        }
      }, 3200);
      var heroSlides = [
        { kicker: '本周精选', title: '让每一次播放<br>都有新的发现', desc: '来自你原有音乐源的热门作品与新鲜推荐。' },
        { kicker: '热歌速递', title: '打开此刻<br>正在流行的声音', desc: '选择一首歌，让音乐陪你进入今天的节奏。' },
        { kicker: '随心聆听', title: '把喜欢的歌<br>留在每一个瞬间', desc: '收藏、歌词、历史与下载，随时为你准备。' }
      ];
      var heroSlideIndex = 0;
      setInterval(function () {
        heroSlideIndex = (heroSlideIndex + 1) % heroSlides.length;
        var slide = heroSlides[heroSlideIndex];
        document.querySelector('.hero-kicker').textContent = slide.kicker;
        document.querySelector('.hero-copy h1').innerHTML = slide.title;
        document.querySelector('.hero-copy p').textContent = slide.desc;
        Array.prototype.forEach.call(document.querySelectorAll('.hero-dots i'), function (dot, index) { dot.classList.toggle('active', index === heroSlideIndex); });
      }, 5200);
      function setPlayMode(mode) {
        state.playMode = mode;
        save('xym_mode', state.playMode);
        applyPlayMode();
        // 更新按钮图标和样式
        $('modeIcon').innerHTML = modeSvgs[mode];
        $('modeBtn').classList.remove('single-mode', 'random-mode');
        if (mode === 'single') $('modeBtn').classList.add('single-mode');
        if (mode === 'random') $('modeBtn').classList.add('random-mode');
        // 更新弹出菜单高亮
        var opts = $('modePopover').querySelectorAll('.mode-option');
        opts.forEach(function (o) { o.classList.toggle('active', o.dataset.mode === mode); });
        toast('播放模式：' + modeNames[mode]);
      }

      function toggleModePopover() {
        var pop = $('modePopover');
        pop.classList.toggle('show');
      }

      function hideModePopover() {
        $('modePopover').classList.remove('show');
      }

      // 音质切换 FLAC → 320 → 128
      var qualityLabels = { '740': 'FLAC', '320': 'HQ', '128': '128' };

      $('modeBtn').addEventListener('click', function (e) {
        e.stopPropagation();
        toggleModePopover();
      });

      // 点弹出菜单里的选项
      $('modePopover').addEventListener('click', function (e) {
        var opt = e.target.closest('.mode-option');
        if (opt) {
          setPlayMode(opt.dataset.mode);
          hideModePopover();
        }
      });

      // 点页面其他地方关闭
      document.addEventListener('click', function (e) {
        if (!$('modePopover').classList.contains('show')) return;
        if (!e.target.closest('#modePopover') && !e.target.closest('#modeBtn')) {
          hideModePopover();
        }
      });

      $('playBtn').addEventListener('click', togglePlay);
      $('nextBtn').addEventListener('click', next);
      $('prevBtn').addEventListener('click', prev);
      $('moreBtn').addEventListener('click', function (e) {
        e.stopPropagation();
        var shown = $('playTools').classList.toggle('show');
        $('moreBtn').setAttribute('aria-expanded', String(shown));
      });
      document.addEventListener('click', function (e) {
        if (!e.target.closest('#playTools') && !e.target.closest('#moreBtn')) {
          $('playTools').classList.remove('show');
          $('moreBtn').setAttribute('aria-expanded', 'false');
        }
      });
      $('likeBtn').addEventListener('click', function () {
        toggleLike(state.currentSong);
        if (state.view === 'favorite') renderSongs(state.favorite, '我的收藏');
      });
      $('lyricBtn').addEventListener('click', showLyric);
      $('lyricClose').addEventListener('click', hideLyric);
      // 点击歌词行跳转播放位置
      $('lyricBody').addEventListener('click', function (e) {
        var line = e.target.closest('.lyric-line');
        if (!line) return;
        var idx = parseInt(line.getAttribute('data-idx'));
        if (!isNaN(idx) && state.lyricLines && state.lyricLines[idx] && state.lyricLines[idx].time >= 0) {
          audio.currentTime = state.lyricLines[idx].time;
          state._lyricUserScroll = Date.now(); // 点击跳转后暂停自动滚动
          toast('跳转至 ' + formatTime(state.lyricLines[idx].time));
        }
      });
      // 点击播放器标题区域也打开歌词
      $('nowTitle').addEventListener('click', showLyric);
      $('nowSub').addEventListener('click', showLyric);
      $('lyricOverlay').addEventListener('click', function (e) {
        if (e.target === $('lyricOverlay')) hideLyric();
      });
      // 歌词页控制按钮
      $('lyricPrev').addEventListener('click', function () { prev(); });
      $('lyricPlay').addEventListener('click', function () { togglePlay(); updateLyricPlayBtn(); });
      $('lyricNext').addEventListener('click', function () { next(); });
      $('lyricLike').addEventListener('click', function () {
        if (!state.currentSong) return;
        toggleLike(state.currentSong);
        var liked = isLiked(state.currentSong);
        $('lyricLike').classList.toggle('liked', liked);
        $('likeBtn').classList.toggle('liked', liked);
      });
      $('lyricDownload').addEventListener('click', function () {
        var song = state.currentSong;
        if (!song) { toast('请先播放一首歌'); return; }
        location.href = API + '/api/download?id=' + encodeURIComponent(song.id) + '&quality=' + state.quality + '&provider=' + encodeURIComponent(song.provider || 'netease') + '&name=' + encodeURIComponent((song.name || 'song') + ' - ' + (song.artist || ''));
      });

      $('downloadBtn').addEventListener('click', function () {
        var song = state.currentSong;
        if (!song) {
          toast('请先播放一首歌');
          return;
        }
        // 保存下载记录
        var downloads = load('xym_downloads') || [];
        downloads.unshift({
          name: song.name, artist: song.artist, quality: (qualityLabels && qualityLabels[state.quality]) || 'HQ',
          status: 'done', time: Date.now()
        });
        downloads = downloads.slice(0, 50);
        save('xym_downloads', downloads);
        location.href = API + '/api/download?id=' + encodeURIComponent(song.id) + '&quality=' + state.quality + '&provider=' + encodeURIComponent(song.provider || song.source || 'netease') + '&name=' + encodeURIComponent((song.name || 'song') + ' - ' + (song.artist || ''));
      });

      function updateVolume() {
        audio.volume = Math.max(0, Math.min(1, state.volume));
        $('volumeRange').value = Math.round(state.volume * 100);
        $('muteBtn').textContent = audio.muted || state.volume === 0 ? '取消静音' : '静音';
      }
      $('volumeRange').value = Math.round(state.volume * 100);
      updateVolume();
      $('volumeRange').addEventListener('input', function () {
        state.volume = Number(this.value) / 100;
        audio.muted = false;
        save('xym_volume', state.volume);
        updateVolume();
      });
      $('muteBtn').addEventListener('click', function () {
        audio.muted = !audio.muted;
        updateVolume();
      });

      function setSleepTimer(minutes) {
        if (state.sleepTimer) clearTimeout(state.sleepTimer);
        state.sleepTimer = null;
        $('sleepStatus').textContent = '';
        if (!minutes) return;
        $('sleepStatus').textContent = minutes + ' 分钟后暂停';
        state.sleepTimer = setTimeout(function () {
          audio.pause();
          state.playing = false;
          updatePlayButton();
          $('sleepTimer').value = '0';
          $('sleepStatus').textContent = '';
          toast('定时关闭：已暂停播放');
        }, minutes * 60000);
      }
      $('sleepTimer').addEventListener('change', function () { setSleepTimer(Number(this.value)); });

      document.addEventListener('keydown', function (event) {
        if (event.target.matches('input, select, textarea') || event.altKey || event.ctrlKey || event.metaKey) return;
        if (event.code === 'Space') { event.preventDefault(); togglePlay(); }
        if (event.code === 'ArrowLeft' && audio.src) { event.preventDefault(); audio.currentTime = Math.max(0, audio.currentTime - 5); }
        if (event.code === 'ArrowRight' && audio.src && Number.isFinite(audio.duration)) { event.preventDefault(); audio.currentTime = Math.min(audio.duration, audio.currentTime + 5); }
      });

      // 进度条拖动：用 change 事件（松手才 seek），避免 touchmove 跳帧卡顿
      var seekInputHandler = function () {
        var d = audio.duration;
        if (d && !isNaN(d) && isFinite(d) && d > 0) audio.currentTime = d * Number(this.value) / 100;
      };
      $('seek').addEventListener('change', seekInputHandler);
      $('seek').addEventListener('input', function () {
        $('curTime').textContent = formatTime(audio.duration * Number(this.value) / 100);
      });
      $('lyricSeek').addEventListener('change', function () {
        var d = audio.duration;
        if (d && !isNaN(d) && isFinite(d) && d > 0) audio.currentTime = d * Number(this.value) / 100;
      });
      $('lyricSeek').addEventListener('input', function () {
        $('lyricCurTime').textContent = formatTime(audio.duration * Number(this.value) / 100);
      });
      audio.addEventListener('timeupdate', function () {
        $('curTime').textContent = formatTime(audio.currentTime);
        syncMediaSession();
        var dur = audio.duration;
        if (!dur || isNaN(dur) || !isFinite(dur)) return;
        if (dur > 0) {
          $('durTime').textContent = formatTime(audio.duration);
          $('seek').value = Math.round(audio.currentTime / audio.duration * 100);
          // 同步歌词页进度条
          $('lyricCurTime').textContent = formatTime(audio.currentTime);
          $('lyricDurTime').textContent = formatTime(audio.duration);
          $('lyricSeek').value = Math.round(audio.currentTime / audio.duration * 100);
          // 息屏/后台看门狗：timeupdate 事件在后台仍可靠触发
          var remaining = audio.duration - audio.currentTime;
          if (remaining < 0.5 && !state._nearEndTime) {
            state._nearEndTime = Date.now();
          }
          if (state._nearEndTime && Date.now() - state._nearEndTime > 2000 && remaining < 0.5) {
            state._nearEndTime = 0;
            if (!state._endedFired) next();
          }
          if (remaining >= 0.5) {
            state._nearEndTime = 0;
            state._endedFired = false;
          }
        }
      });
      audio.addEventListener('loadedmetadata', function () {
        if (audio.duration && !isNaN(audio.duration) && isFinite(audio.duration)) {
          $('durTime').textContent = formatTime(audio.duration);
        }
        syncMediaSession();
      });
      audio.addEventListener('play', function () { state.playing = true; state.resumeAfterInterruption = false; updatePlayButton(); syncMediaSession(); });
      audio.addEventListener('pause', function () { state.playing = false; updatePlayButton(); syncMediaSession(); saveResume(); });
      audio.addEventListener('ended', function () {
        state._endedFired = true;
        next();
      });
      audio.addEventListener('error', function () {
        if (state.playing) {
          // 网络中断（code 2）时尝试恢复当前播放位置
          if (audio.error && audio.error.code === 2 && state.currentSong) {
            var savedTime = audio.currentTime || 0;
            var song = state.currentSong;
            var streamUrl = API + '/api/stream?id=' + encodeURIComponent(song.id) + '&quality=' + state.quality + '&provider=' + encodeURIComponent(song.provider || 'netease') + '&name=' + encodeURIComponent(song.name || '') + '&artist=' + encodeURIComponent(song.artist || '');
            unlockAudio();
            audio.src = streamUrl;
            audio.play().then(function () { audio.currentTime = savedTime; }).catch(function () {});
            return;
          }
          state._errCount = (state._errCount || 0) + 1;
          if (state._errCount >= 3) {
            state._errCount = 0;
            state.playing = false;
            updatePlayButton();
            toast('连续多首播放失败，请检查网络');
            audio.pause();
          } else {
            toast('当前歌曲无法播放，自动尝试下一首');
            next();
          }
        }
      });
      // 成功播放后清零错误计数
      audio.addEventListener('play', function () { state._errCount = 0; });
      window.addEventListener('pagehide', saveResume);
      window.addEventListener('beforeunload', saveResume);
      $('nowCover').addEventListener('error', function () { $('nowCover').src = coverFallback; });
      $('nowCover').src = coverFallback;

      function restoreSession() {
        var resume = state.resume;
        if (!resume || !resume.song || !resume.song.id) return;
        state.songs = [resume.song];
        state.currentIndex = 0;
        if (resume.quality && qualityLabels[resume.quality]) state.quality = resume.quality;
        playAt(0, { autoplay: false });
        audio.addEventListener('loadedmetadata', function restorePosition() {
          audio.removeEventListener('loadedmetadata', restorePosition);
          audio.currentTime = Math.max(0, Math.min(Number(resume.time) || 0, audio.duration || 0));
        });
      }

      // 首次加载时同步持久化的模式与音质，不弹出提示。
      $('modeIcon').innerHTML = modeSvgs[state.playMode];
      $('modeBtn').classList.toggle('single-mode', state.playMode === 'single');
      $('modeBtn').classList.toggle('random-mode', state.playMode === 'random');
      Array.prototype.forEach.call($('modePopover').querySelectorAll('.mode-option'), function (option) {
        option.classList.toggle('active', option.dataset.mode === state.playMode);
      });
      applyPlayMode();
      restoreSession();

      var deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function (event) {
        event.preventDefault();
        deferredInstallPrompt = event;
        $('installBtn').classList.add('ready');
      });
      $('installBtn').addEventListener('click', function () {
        if (!deferredInstallPrompt) return;
        deferredInstallPrompt.prompt();
        deferredInstallPrompt.userChoice.finally(function () {
          deferredInstallPrompt = null;
          $('installBtn').classList.remove('ready');
        });
      });
      window.addEventListener('appinstalled', function () { toast('已安装到设备桌面'); });

      loadRecommend();
      setView('recommend');
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(function () {});
    })();
  </script>
</body>
</html>
