<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#090909">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="小源音乐">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link rel="dns-prefetch" href="//music.163.com">
  <link rel="dns-prefetch" href="//music-api.gdstudio.xyz">
  <link rel="preconnect" href="//p1.music.126.net" crossorigin>
  <link rel="preconnect" href="//p2.music.126.net" crossorigin>
  <link rel="preconnect" href="//music.163.com">
  <link rel="preconnect" href="//music-api.gdstudio.xyz">
  <title>小源音乐</title>
  <style>
    :root {
      --bg: #faf7f2;
      --card: #fff;
      --line: rgba(0, 0, 0, .08);
      --text: #1c1a18;
      --muted: #776f68;
      --soft: #aaa29a;
      --accent: #e8873a;
      --accent-2: #1f9d84;
      --danger: #d65a4a;
      --shadow: 0 14px 40px rgba(67, 45, 27, .1);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --card: #1e1e1e;
        --line: rgba(255, 255, 255, .08);
        --text: #e0e0e0;
        --muted: #999;
        --soft: #666;
        --accent: #f0934c;
        --accent-2: #2aaf9a;
        --danger: #e0554a;
        --shadow: 0 14px 40px rgba(0, 0, 0, .4);
      }
      .player { background: rgba(30, 30, 30, .97); }
      .icon-btn { background: #2a2a2a; color: var(--text); }
      .song.playing { background: rgba(240, 147, 76, .12); }
      .song:active { background: rgba(255, 255, 255, .04); }
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      min-height: 100dvh;
      padding-bottom: clamp(110px, 14vh, 130px);
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-size-adjust: none;
      -webkit-text-size-adjust: none;
    }

    button, input { font: inherit; }
    button {
      cursor: pointer;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
    }

    .app {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: clamp(12px, 2vw, 18px) clamp(8px, 2vw, 14px) clamp(20px, 3vw, 28px);
    }

    .top {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: clamp(8px, 1.5vw, 12px);
      align-items: center;
      margin-bottom: clamp(8px, 1.5vw, 12px);
    }
    .brand {
      font-weight: 800;
      font-size: clamp(16px, 3vw, 22px);
      color: var(--text);
      white-space: nowrap;
    }
    .brand span { color: var(--accent); }
    .search { display: flex; gap: 8px; min-width: 0; }
    .search input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: clamp(8px, 1.5vw, 11px) clamp(10px, 2vw, 15px);
      outline: 0;
      background: var(--card);
      color: var(--text);
      font-size: clamp(14px, 2vw, 16px);
    }
    .search input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232, 135, 58, .14); }
    .btn {
      border: 0;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      padding: 0 clamp(14px, 2vw, 18px);
      min-height: 44px;
      font-weight: 700;
      white-space: nowrap;
      font-size: clamp(13px, 2vw, 15px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }

    .tabs {
      display: flex;
      gap: clamp(4px, 1vw, 8px);
      overflow-x: auto;
      scrollbar-width: none;
      margin-bottom: clamp(8px, 1.5vw, 12px);
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--muted);
      border-radius: 999px;
      padding: clamp(6px, 1vw, 9px) clamp(10px, 1.5vw, 14px);
      white-space: nowrap;
      font-size: clamp(12px, 1.8vw, 14px);
      touch-action: manipulation;
    }
    .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }

    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: clamp(6px, 1vw, 8px);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: clamp(10px, 1.5vw, 12px) clamp(10px, 1.5vw, 14px);
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: clamp(11px, 1.5vw, 13px);
    }

    .song {
      display: grid;
      grid-template-columns: 34px 48px minmax(0, 1fr) auto;
      gap: clamp(6px, 1vw, 10px);
      align-items: center;
      padding: clamp(8px, 1.2vw, 10px) clamp(8px, 1.5vw, 14px);
      border-bottom: 1px solid var(--line);
      min-height: clamp(58px, 9vh, 68px);
      touch-action: manipulation;
    }
    .song:last-child { border-bottom: 0; }
    .song.playing { background: rgba(232, 135, 58, .08); }
    .song:active { background: rgba(0, 0, 0, .03); }

    .index {
      color: var(--soft);
      text-align: center;
      font-size: clamp(11px, 1.5vw, 13px);
      flex-shrink: 0;
    }
    .cover {
      width: clamp(36px, 6vw, 48px);
      height: clamp(36px, 6vw, 48px);
      border-radius: clamp(6px, 1vw, 8px);
      object-fit: cover;
      background: #eee3d6;
      flex-shrink: 0;
    }

    .song-main { min-width: 0; overflow: hidden; max-width: 100%; }
    .song-name {
      font-weight: 700;
      font-size: clamp(13px, 1.8vw, 15px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .song-meta {
      color: var(--muted);
      font-size: clamp(11px, 1.5vw, 13px);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .song-actions { display: flex; gap: clamp(4px, 0.8vw, 6px); flex-shrink: 0; }

    .icon-btn {
      width: clamp(28px, 4.5vw, 36px);
      height: clamp(28px, 4.5vw, 36px);
      border-radius: 50%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(11px, 1.8vw, 14px);
      flex-shrink: 0;
      touch-action: manipulation;
    }
    .icon-btn.liked { color: var(--danger); border-color: rgba(214, 90, 74, .35); }
    .icon-btn svg {
      width: clamp(14px, 2vw, 18px);
      height: clamp(14px, 2vw, 18px);
      fill: currentColor;
      pointer-events: none;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: clamp(30px, 6vh, 44px) 18px;
      line-height: 1.8;
      font-size: clamp(13px, 1.8vw, 15px);
    }
    .empty strong { color: var(--text); }

    .player {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 20;
      background: rgba(255, 255, 255, .97);
      border-top: 1px solid var(--line);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: clamp(6px, 1vh, 8px) max(12px, env(safe-area-inset-left)) clamp(6px, 1vh, 8px) max(12px, env(safe-area-inset-right));
      padding-bottom: calc(clamp(6px, 1vh, 8px) + env(safe-area-inset-bottom, 0px));
    }
    .player-inner { width: min(980px, 100%); margin: 0 auto; }
    .seek { display: flex; align-items: center; gap: clamp(6px, 1vw, 8px); color: var(--muted); font-size: clamp(10px, 1.5vw, 12px); }
    .seek input {
      flex: 1;
      accent-color: var(--accent);
      height: 4px;
    }
    .player-row {
      display: grid;
      grid-template-columns: clamp(36px, 5vw, 52px) minmax(0, clamp(5em, 10vw, 10em)) auto;
      gap: clamp(6px, 1.2vw, 14px);
      align-items: center;
      margin-top: clamp(2px, 0.5vh, 4px);
    }
    .now-title {
      font-weight: 800;
      font-size: clamp(13px, 1.8vw, 15px);
      white-space: nowrap;
      overflow: hidden;
      max-width: clamp(5em, 10vw, 10em);
    }
    .now-title .title-inner {
      display: inline-block;
      white-space: nowrap;
    }
    .now-title.scroll .title-inner {
      animation: title-scroll 8s linear infinite;
      padding-right: 2em;
    }
    @keyframes title-scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }
    .now-sub {
      color: var(--muted);
      font-size: clamp(11px, 1.5vw, 13px);
      margin-top: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .controls { display: flex; align-items: center; gap: clamp(3px, 0.6vw, 6px); flex-shrink: 0; }
    .play-btn {
      width: clamp(40px, 6vw, 48px);
      height: clamp(40px, 6vw, 48px);
      border: 0;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      font-size: clamp(16px, 3vw, 20px);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      touch-action: manipulation;
      box-shadow: 0 2px 12px rgba(232, 135, 58, .45);
      transition: transform .12s, box-shadow .12s;
    }
    .play-btn:active { transform: scale(0.92); }
    .play-btn svg { width: clamp(16px, 2.5vw, 22px); height: clamp(16px, 2.5vw, 22px); }
    @media (hover: hover) {
      .play-btn:hover { box-shadow: 0 4px 20px rgba(232, 135, 58, .6); transform: scale(1.06); }
    }

    .toast {
      position: fixed;
      top: clamp(8px, 2vh, 14px);
      left: 50%;
      transform: translateX(-50%);
      background: #1d1a17;
      color: #fff;
      padding: clamp(8px, 1.5vh, 10px) clamp(14px, 3vw, 18px);
      border-radius: 999px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .2s;
      z-index: 40;
      max-width: min(92vw, 520px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: clamp(12px, 1.8vw, 14px);
    }
    .toast.show { opacity: 1; }

    .lyric-overlay {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
    }
    .lyric-overlay.show { display: flex; }
    .lyric-fullscreen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 51;
      overflow-x: hidden;
    }
    /* ===== 歌词页：樱花粉默认背景 + 黑胶唱片 + 飘落花瓣 ===== */
    .lyric-bg {
      position: absolute; inset: 0; z-index: -1;
      background: linear-gradient(175deg, #fce4ec 0%, #f8bbd0 18%, #f48fb1 40%, #f8bbd0 60%, #e1bee7 78%, #fce4ec 100%);
    }
    .lyric-bg::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse at 12% 8%, rgba(255,225,235,.5) 0%, transparent 40%),
        radial-gradient(ellipse at 82% 18%, rgba(255,185,205,.4) 0%, transparent 48%),
        radial-gradient(ellipse at 40% 50%, rgba(255,210,220,.45) 0%, transparent 55%),
        radial-gradient(ellipse at 22% 72%, rgba(245,185,210,.3) 0%, transparent 42%),
        radial-gradient(ellipse at 78% 62%, rgba(255,215,228,.35) 0%, transparent 50%),
        radial-gradient(circle at 48% 32%, rgba(255,242,247,.5) 0%, transparent 65%);
      animation: petal-shift 10s ease-in-out infinite;
    }
    @keyframes petal-shift { 0%,100%{opacity:.8} 50%{opacity:1} }
    /* 飘落花瓣 */
    .sakura-petals { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
    .sakura-petal {
      position: absolute; width: 14px; height: 14px; opacity: 0;
      background: radial-gradient(circle at 30% 30%, #ffccd5, #f48fb1);
      border-radius: 50% 0 50% 0;
      animation: petal-fall linear infinite;
    }
    .sakura-petal:nth-child(1) { left: 8%; animation-duration: 9s; animation-delay: 0s; }
    .sakura-petal:nth-child(2) { left: 22%; animation-duration: 11s; animation-delay: -2s; width: 10px; height: 10px; }
    .sakura-petal:nth-child(3) { left: 38%; animation-duration: 13s; animation-delay: -4s; width: 16px; height: 16px; }
    .sakura-petal:nth-child(4) { left: 52%; animation-duration: 10s; animation-delay: -6s; width: 11px; height: 11px; }
    .sakura-petal:nth-child(5) { left: 66%; animation-duration: 12s; animation-delay: -1s; }
    .sakura-petal:nth-child(6) { left: 80%; animation-duration: 14s; animation-delay: -3s; width: 13px; height: 13px; }
    .sakura-petal:nth-child(7) { left: 14%; animation-duration: 10.5s; animation-delay: -5s; width: 9px; height: 9px; }
    .sakura-petal:nth-child(8) { left: 56%; animation-duration: 11.5s; animation-delay: -7s; width: 15px; height: 15px; }
    @keyframes petal-fall {
      0% { transform: translateY(-10vh) rotate(0deg) translateX(0); opacity: 0; }
      5% { opacity: .7; }
      50% { opacity: .5; transform: translateY(55vh) rotate(180deg) translateX(40px); }
      90% { opacity: .1; }
      100% { transform: translateY(105vh) rotate(360deg) translateX(-30px); opacity: 0; }
    }

    /* 黑胶唱片 */
    .vinyl-record {
      position: absolute; top: 14%; left: 50%; transform: translateX(-50%);
      width: min(250px, 42vw); height: min(250px, 42vw); border-radius: 50%;
      z-index: 0; pointer-events: none; opacity: .55;
      background: radial-gradient(circle at center,
        #2a2a2a 0%, #2a2a2a 9%, #f06292 9.5%, #f06292 11%,
        #1a1a1a 11.5%, #1a1a1a 17%, #252525 17.5%, #252525 26%,
        #1f1f1f 26.5%, #1f1f1f 34%, #2a2a2a 34.5%, #2a2a2a 43%,
        #1f1f1f 43.5%, #1f1f1f 51%, #2a2a2a 51.5%, #2a2a2a 60%,
        #1a1a1a 60.5%, #1a1a1a 100%
      );
      box-shadow: 0 0 50px rgba(255,145,175,.3), 0 0 100px rgba(255,165,190,.2), 0 0 150px rgba(255,125,160,.1), 0 25px 60px rgba(0,0,0,.2);
      animation: vinyl-spin 8s linear infinite;
    }
    .vinyl-record.paused { animation-play-state: paused; }
    .vinyl-record::after {
      content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 20%; height: 20%; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fff, #ffccd5 30%, #f06292 65%, #c04860 100%);
      box-shadow: 0 0 20px rgba(255,145,170,.6), 0 0 40px rgba(255,115,150,.3), inset 0 1px 2px rgba(255,255,255,.4);
    }
    .vinyl-record::before {
      content: ''; position: absolute; inset: -10px; border-radius: 50%; background: transparent;
      box-shadow: 0 0 35px rgba(255,175,195,.15), 0 0 65px rgba(255,145,175,.1);
      animation: vinyl-glow 3s ease-in-out infinite;
    }
    @keyframes vinyl-spin { from { transform: translateX(-50%) rotate(0deg); } to { transform: translateX(-50%) rotate(360deg); } }
    @keyframes vinyl-glow { 0%,100%{ box-shadow: 0 0 35px rgba(255,175,195,.15), 0 0 65px rgba(255,145,175,.1); } 50%{ box-shadow: 0 0 50px rgba(255,175,195,.28), 0 0 85px rgba(255,145,175,.2); } }

    /* 歌词文字：暖粉色调 */
    .lyric-body { color: rgba(75,28,38,.4); }
    .lyric-line.active { color: #b84460; font-weight: 750; text-shadow: 0 0 22px rgba(184,68,96,.22), 0 2px 4px rgba(184,68,96,.08); }
    .lyric-songname { color: #4a1a2a; text-shadow: 0 2px 12px rgba(180,70,90,.2); }
    .lyric-artist { color: rgba(90,30,52,.45); }
    .lyric-seek { color: rgba(100,40,55,.45); }
    .lyric-seek input { accent-color: #d4687c; }
    .lyric-controls .icon-btn { border-color: rgba(175,95,115,.18); background: rgba(255,195,210,.18); color: rgba(80,30,42,.65); }
    .lyric-controls .play-btn { background: linear-gradient(135deg, #f48fb1, #ec407a); color: #fff; box-shadow: 0 4px 20px rgba(220,100,130,.35); }
    .lyric-close {
      position: absolute;
      top: max(14px, env(safe-area-inset-top));
      left: 14px;
      z-index: 52;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 16px;
      touch-action: manipulation;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lyric-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 60px 20px 20px;
      overflow: hidden;
    }
    .lyric-header {
      text-align: center;
      margin-bottom: 24px;
    }
    .lyric-songname {
      font-size: clamp(18px, 3vw, 24px);
      font-weight: 800;
    }
    .lyric-artist {
      font-size: clamp(13px, 2vw, 16px);
      margin-top: 4px;
    }
    .lyric-seek {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      max-width: 400px;
      padding: 8px 16px;
      font-size: 11px;
    }
    .lyric-seek input {
      flex: 1;
      accent-color: var(--accent);
      height: 3px;
    }
    .lyric-body {
      flex: 1;
      width: 100%;
      max-width: 500px;
      overflow-y: auto;
      overflow-x: hidden;
      font-size: clamp(15px, 2.5vw, 18px);
      line-height: 2.8;
      white-space: pre-wrap;
      text-align: center;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
      mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
      -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 15%, black 85%, transparent 100%);
    }
    .lyric-empty { padding: 40px 0; }
    .lyric-line {
      transition: all .3s;
      padding: 2px 0;
      cursor: pointer;
    }
    .lyric-line:active { opacity: .6; }
    .lyric-line.active {
      font-size: clamp(18px, 3vw, 22px);
      font-weight: 700;
    }
    .lyric-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(8px, 2vw, 14px);
      padding: 16px 20px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      width: 100%;
    }
    .lyric-controls .icon-btn {
      width: clamp(36px, 6vw, 42px);
      height: clamp(36px, 6vw, 42px);
      backdrop-filter: blur(8px);
    }
    .lyric-controls .icon-btn.liked {
      color: #ff4d6a;
      border-color: rgba(255,77,106,.4);
      background: rgba(255,77,106,.12);
    }
    .lyric-controls .play-btn {
      width: clamp(46px, 8vw, 56px);
      height: clamp(46px, 8vw, 56px);
      box-shadow: 0 4px 20px rgba(232,135,58,.4);
    }

    .mode-btn {
      position: relative;
      border-color: var(--accent);
      color: var(--accent);
    }
    .mode-btn.single-mode { color: var(--accent-2); border-color: var(--accent-2); }
    .mode-btn.random-mode { color: #7c3aed; border-color: #7c3aed; }

    .mode-popover {
      position: fixed;
      bottom: 90px;
      right: max(12px, env(safe-area-inset-right));
      z-index: 30;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0,0,0,.15);
      padding: 6px;
      display: none;
      flex-direction: column;
      gap: 2px;
      min-width: 140px;
    }
    .mode-popover.show { display: flex; }
    .mode-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: var(--text);
      font-size: 14px;
      cursor: pointer;
      white-space: nowrap;
      touch-action: manipulation;
      transition: background .15s;
    }
    .mode-option:active { background: var(--line); }
    .mode-option.active { color: var(--accent); font-weight: 700; background: rgba(232,135,58,.08); }
    .mode-opt-icon { width: 20px; height: 20px; flex-shrink: 0; }

    @media (max-width: 480px) {
      .mode-popover { bottom: 80px; right: 8px; }
    }

    .site-footer {
      text-align: center;
      color: var(--soft);
      font-size: 11px;
      padding: 12px 14px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .subtabs { display: flex; gap: 5px; overflow-x: auto; scrollbar-width: none; margin-bottom: 10px; }

    .subtab {

    .pager {

      gap: 6px;
      padding: 16px 10px;
      flex-wrap: wrap;

      color: var(--text);

      font-weight: 600;

    /* 骨架屏加载动画 */
    .skeleton { display: flex; align-items: center; padding: 10px 14px; gap: 10px; }
    .skeleton-cover { width: 48px; height: 48px; border-radius: 8px; background: var(--line); flex-shrink: 0; animation: sk-pulse 1.4s ease-in-out infinite; }

    /* ====== 响应式断点 ====== */

    .quick-card small { margin-top: 4px; color: var(--desk-muted); font-size: 12px; }
    .quick-card::after { content: '▶'; position: absolute; right: 8px; top: calc(100% - 73px); display: grid; width: 29px; height: 29px; place-items: center; border-radius: 50%; background: var(--desk-accent); color: #fff; font-size: 10px; opacity: 0; transform: translateY(5px); transition: .2s; }
    .quick-card:hover::after { opacity: 1; transform: translateY(0); }
    .subtabs { margin-bottom: 12px; }
    .subtab { background: #1b1d23; color: #a9aeba; }
    .subtab.active { background: #fff; color: #15161a; }
    .panel { display: block; border: 1px solid var(--desk-line); border-radius: 15px; background: rgba(22,24,30,.74); box-shadow: none; overflow: hidden; }
    .panel-head { position: static; padding: 16px 18px; background: transparent; border-bottom-color: var(--desk-line); }
    .panel-head strong { font-size: 16px; }
    .song, .soda-card { position: relative; display: grid; grid-template-columns: 38px 44px minmax(0, 1fr) auto; min-height: 65px; margin: 0; padding: 9px 16px; overflow: visible; border: 0; border-bottom: 1px solid rgba(255,255,255,.055); border-radius: 0; background: transparent; color: #fff; isolation: auto; }
    .song::before, .soda-card::before { display: none; }
    .song .cover, .soda-card .cover { position: static; z-index: auto; width: 44px; height: 44px; border-radius: 8px; opacity: 1; transform: none; }
    .song .index, .soda-card .index { position: static; z-index: auto; width: auto; height: auto; padding: 0; border-radius: 0; background: none; color: #747985; font-weight: 400; backdrop-filter: none; }
    .song .song-main, .soda-card .song-main { position: static; z-index: auto; right: auto; bottom: auto; left: auto; overflow: hidden; }
    .song .song-name, .soda-card .song-name { overflow: hidden; color: #f2f3f4; font-size: 14px; font-weight: 700; line-height: normal; letter-spacing: 0; text-overflow: ellipsis; text-shadow: none; white-space: nowrap; }
    .song .song-meta, .soda-card .song-meta { overflow: hidden; margin-top: 3px; color: #818792; font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }
    .song .song-actions, .soda-card .song-actions { position: static; z-index: auto; flex-direction: row; gap: 6px; }
    .song .song-actions .icon-btn, .soda-card .song-actions .icon-btn { width: 32px; height: 32px; background: transparent !important; backdrop-filter: none; }
    .song .play-one, .soda-card .play-one { color: #fff; }
    .song:hover { background: rgba(255,255,255,.045); }
    .song.playing { background: rgba(255,89,108,.1); }
    .song.playing .index { color: var(--desk-accent); font-weight: 800; }
    .workspace-panel { padding: 26px; border: 1px solid var(--desk-line); border-radius: 15px; background: var(--desk-panel); }
    .workspace-panel h2 { margin: 0 0 8px; font-size: 22px; }
    .workspace-panel p { color: var(--desk-muted); line-height: 1.75; }
    .workspace-panel .workspace-icon { display: grid; width: 54px; height: 54px; place-items: center; margin-bottom: 14px; border-radius: 16px; background: rgba(255,89,108,.13); color: #ff8290; font-size: 24px; }

    /* ====== 独立页面板块样式 ====== */
    .page-panel { display: none; padding: 0; border: 0; border-radius: 15px; background: transparent; }
    .page-panel.active { display: block; }
    .page-header { display: flex; align-items: center; gap: 14px; margin-bottom: 22px; padding: 22px 26px; border-radius: 15px; background: linear-gradient(135deg, rgba(255,255,255,.06), rgba(255,255,255,.02)); border: 1px solid var(--desk-line); }
    .page-header-icon { display: grid; width: 52px; height: 52px; place-items: center; border-radius: 14px; font-size: 26px; flex-shrink: 0; }
    .page-header h2 { margin: 0; font-size: 20px; letter-spacing: -.04em; }
    .page-header p { margin: 4px 0 0; color: var(--desk-muted); font-size: 13px; }

    /* 音乐库：封面卡片网格 */
    .library-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
    .lib-cat-card {
      position: relative; padding: 0; border: 0; border-radius: 16px;
      overflow: hidden; color: #fff; text-align: left; cursor: pointer;
      transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s;
      aspect-ratio: 3/4; min-height: 160px;
      box-shadow: 0 4px 20px rgba(0,0,0,.25);
    }
    .lib-cat-card:hover { transform: translateY(-5px) scale(1.02); box-shadow: 0 16px 40px rgba(0,0,0,.45); }
    .lib-cat-card .cat-bg { position: absolute; inset: 0; transition: transform .4s; }
    .lib-cat-card:hover .cat-bg { transform: scale(1.08); }
    .lib-cat-card .cat-bg img { width: 100%; height: 100%; object-fit: cover; }
    .lib-cat-card .cat-bg::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(0,0,0,.1) 0%, rgba(0,0,0,.15) 30%, rgba(0,0,0,.75) 100%);
    }
    .lib-cat-card .cat-info {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 1;
      padding: 20px 16px 16px;
    }
    .lib-cat-card .cat-icon { font-size: 22px; margin-bottom: 6px; opacity: .9; }
    .lib-cat-card .cat-name { font-weight: 800; font-size: 17px; letter-spacing: -.02em; line-height: 1.2; text-shadow: 0 2px 8px rgba(0,0,0,.4); }
    .lib-cat-card .cat-count { font-size: 12px; opacity: .7; margin-top: 4px; font-weight: 500; }
    /* 分类颜色主题 */
    .lib-cat-card.theme-0 .cat-bg::after { background: linear-gradient(180deg, rgba(220,38,38,.05), rgba(180,20,20,.5) 100%); }
    .lib-cat-card.theme-1 .cat-bg::after { background: linear-gradient(180deg, rgba(37,99,235,.05), rgba(20,60,180,.5) 100%); }
    .lib-cat-card.theme-2 .cat-bg::after { background: linear-gradient(180deg, rgba(202,138,4,.05), rgba(150,100,10,.5) 100%); }
    .lib-cat-card.theme-3 .cat-bg::after { background: linear-gradient(180deg, rgba(147,51,234,.05), rgba(100,30,180,.5) 100%); }
    .lib-cat-card.theme-4 .cat-bg::after { background: linear-gradient(180deg, rgba(15,118,110,.05), rgba(10,80,70,.5) 100%); }

    /* 排行榜：排名列表 */
    .chart-list { display: grid; gap: 6px; }
    .chart-song { display: grid; grid-template-columns: 40px 48px minmax(0, 1fr) auto; gap: 10px; align-items: center; padding: 10px 14px; border-radius: 11px; background: rgba(255,255,255,.03); border: 1px solid transparent; transition: .15s; cursor: pointer; }
    .chart-song:hover { background: rgba(255,255,255,.06); border-color: var(--desk-line); }
    .chart-rank { text-align: center; font-weight: 850; font-size: 17px; color: var(--desk-muted); }
    .chart-song.top1 .chart-rank { color: #f0c040; font-size: 22px; text-shadow: 0 0 12px rgba(240,192,64,.4); }
    .chart-song.top2 .chart-rank { color: #c0c0c0; font-size: 20px; text-shadow: 0 0 10px rgba(192,192,192,.35); }
    .chart-song.top3 .chart-rank { color: #cd7f32; font-size: 19px; text-shadow: 0 0 8px rgba(205,127,50,.3); }
    .chart-song.top1 { background: linear-gradient(90deg, rgba(240,192,64,.08), rgba(240,192,64,.01)); border-color: rgba(240,192,64,.15); }
    .chart-song.top2 { background: linear-gradient(90deg, rgba(192,192,192,.06), rgba(192,192,192,.01)); border-color: rgba(192,192,192,.1); }
    .chart-song.top3 { background: linear-gradient(90deg, rgba(205,127,50,.06), rgba(205,127,50,.01)); border-color: rgba(205,127,50,.1); }
    .chart-song img { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; }
    .chart-song .song-name { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chart-song .song-artist { color: var(--desk-muted); font-size: 12px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .chart-song .chart-actions { display: flex; gap: 4px; }
    .chart-song .chart-actions .icon-btn { width: 30px; height: 30px; border: 0; background: rgba(255,255,255,.08); }

    /* 歌单：卡片网格 */
    .plist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
    .plist-card { border: 0; border-radius: 14px; background: rgba(255,255,255,.04); overflow: hidden; transition: transform .18s, box-shadow .18s; cursor: pointer; text-align: left; }
    .plist-card:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(0,0,0,.3); }
    .plist-cover { position: relative; aspect-ratio: 1; background: linear-gradient(135deg, #2a2045, #1f3550); display: grid; place-items: center; }
    .plist-cover .plist-icon { font-size: 48px; opacity: .7; }
    .plist-cover .plist-overlay { position: absolute; inset: 0; background: linear-gradient(transparent 55%, rgba(0,0,0,.7)); }
    .plist-cover .plist-count { position: absolute; bottom: 12px; right: 14px; color: #fff; font-size: 13px; font-weight: 700; }
    .plist-info { padding: 14px; }
    .plist-info .plist-name { font-weight: 800; font-size: 15px; color: #fff; }
    .plist-info .plist-desc { color: var(--desk-muted); font-size: 12px; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .plist-empty { text-align: center; padding: 50px 20px; color: var(--desk-muted); }
    .plist-empty .plist-empty-icon { font-size: 60px; margin-bottom: 14px; opacity: .5; }

    /* 下载管理 */
    .dl-list { display: grid; gap: 8px; }
    .dl-item { display: grid; grid-template-columns: auto 1fr auto; gap: 14px; align-items: center; padding: 14px 18px; border-radius: 12px; background: rgba(255,255,255,.03); border: 1px solid var(--desk-line); }
    .dl-icon-wrap { display: grid; width: 44px; height: 44px; place-items: center; border-radius: 11px; font-size: 20px; flex-shrink: 0; }
    .dl-icon-wrap.done { background: rgba(46,204,113,.13); color: #2ecc71; }
    .dl-icon-wrap.pending { background: rgba(241,196,15,.13); color: #f1c40f; }
    .dl-name { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dl-meta { color: var(--desk-muted); font-size: 12px; margin-top: 2px; }
    .dl-status { color: #2ecc71; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 99px; background: rgba(46,204,113,.1); }
    .dl-empty { text-align: center; padding: 50px 20px; color: var(--desk-muted); }

    /* 历史播放时间线 */
    .history-list { display: grid; gap: 4px; }
    .hist-item { display: grid; grid-template-columns: 36px 44px minmax(0, 1fr) auto; gap: 10px; align-items: center; padding: 9px 14px; border-radius: 10px; transition: .15s; cursor: pointer; }
    .hist-item:hover { background: rgba(255,255,255,.04); }
    .hist-dot { width: 8px; height: 8px; margin: 0 auto; border-radius: 50%; background: var(--desk-muted); }
    .hist-item:first-child .hist-dot { background: var(--desk-accent); box-shadow: 0 0 10px rgba(255,89,108,.5); width: 10px; height: 10px; }
    .hist-item img { width: 40px; height: 40px; border-radius: 7px; object-fit: cover; }
    .hist-name { font-weight: 700; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hist-artist { color: var(--desk-muted); font-size: 12px; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .hist-time { color: var(--desk-muted); font-size: 11px; }
    .hist-actions { display: flex; gap: 4px; }
    .hist-actions .icon-btn { width: 28px; height: 28px; border: 0; background: rgba(255,255,255,.06); font-size: 12px; }

    /* 收藏页面爱心主题 */
    .fav-header { background: linear-gradient(135deg, rgba(255,77,106,.12), rgba(255,89,108,.03)); border-color: rgba(255,77,106,.15); }
    .fav-header .page-header-icon { background: rgba(255,77,106,.15); color: #ff6b81; }

    .player { left: 218px; background: rgba(18,20,25,.9); }
    .player-inner { width: min(1280px, 100%); padding: 0 24px; }
    .play-btn { background: #fff; color: #111; }
    .play-tools, .mode-popover { background: #252830; }

    /* ==================== 全面响应式系统 ==================== */

    /* ---- 平板 (901px - 1024px)：缩窄侧边栏 ---- */
    @media (max-width: 1024px) {
      .app { padding: 22px 24px 38px; }
      .quick-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; }
      .hero-art { right: 4%; width: 260px; height: 260px; top: -40px; }
    }

    /* ---- 平板竖屏 / 小桌面 (621px - 900px)：图标侧边栏 ---- */
    @media (max-width: 900px) {
      .sidebar { width: 72px; padding-inline: 9px; }
      .side-brand { justify-content: center; padding-inline: 0; font-size: 0; }
      .side-nav .side-link { justify-content: center; padding: 0; font-size: 0; }
      .side-link span { font-size: 21px; }
      .side-footer small { display: none; }
      .app { width: calc(100% - 72px); margin-left: 72px; padding-inline: 20px; }
      .player { left: 72px; }
      .quick-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
      .hero-art { right: -20px; width: 210px; height: 210px; top: -25px; }
      .hero-copy h1 { font-size: clamp(22px, 3vw, 30px); }
      .home-hero { min-height: 200px; padding: 24px 28px; margin: 10px 0 24px; }
      .page-header { padding: 18px 20px; }
      .library-grid { grid-template-columns: repeat(3, minmax(130px, 1fr)); gap: 10px; }
      .plist-grid { grid-template-columns: repeat(3, minmax(150px, 1fr)); gap: 12px; }
      .workspace-panel { padding: 22px; }
    }

    /* ---- 手机横屏 / 小平板 (481px - 620px)：紧凑布局 ---- */
    @media (max-width: 620px) {
      body { padding-bottom: 116px; }
      /* 底部标签栏导航 */

        position: fixed; inset: auto 0 0; flex-direction: row;
        width: 100%; height: 58px; padding: 4px 4px env(safe-area-inset-bottom, 0);
        border-top: 1px solid var(--desk-line); border-right: 0;
        background: rgba(18,20,25,.95); z-index: 25;
      }
      .side-brand, .side-footer { display: none; }

      .tabs { margin: 14px 0; gap: 16px; }
      .tab { font-size: 14px; padding: 4px 0 6px; }
      /* Hero 区域 */
      .home-hero { min-height: 180px; padding: 22px 18px; border-radius: 14px; margin: 8px 0 20px; }
      .hero-kicker { font-size: 10px; }
      .hero-copy h1 { font-size: 22px; margin: 6px 0; }
      .hero-copy p { max-width: 160px; font-size: 11px; }
      .hero-play { font-size: 12px; padding: 8px 13px; }
      .hero-art { right: -110px; top: -50px; width: 240px; height: 240px; }

      /* 快速推荐 */

      .quick-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .quick-card strong { font-size: 11px; margin-top: 6px; }
      .quick-card small { font-size: 10px; }
      .quick-card::after { display: none; }
      .section-title h2 { font-size: 16px; }
      .section-title span { font-size: 11px; }
      /* 标签和面板 */
      .subtabs { overflow-x: auto; flex-wrap: nowrap; gap: 4px; margin-bottom: 8px; padding-bottom: 2px; }
      .subtab { padding: 5px 10px; font-size: 12px; white-space: nowrap; }
      .panel { border-radius: 13px; }
      .panel-head { padding: 12px 14px; font-size: 12px; }

      /* 歌曲列表 */
      .song, .soda-card { grid-template-columns: 26px 38px minmax(0, 1fr) auto; padding: 8px 10px; gap: 7px; min-height: 60px; }
      .song .cover, .soda-card .cover { width: 38px; height: 38px; border-radius: 7px; }
      .song .index, .soda-card .index { font-size: 12px; }
      .song .song-name, .soda-card .song-name { font-size: 13px; }
      .song .song-meta, .soda-card .song-meta { font-size: 11px; }

      .plist-info .plist-desc { font-size: 11px; }

      .chart-song.top2 .chart-rank { font-size: 16px; }
      .chart-song.top3 .chart-rank { font-size: 15px; }
      .chart-song .song-name { font-size: 13px; }
      .chart-song .song-artist { font-size: 11px; }
      .chart-song .chart-actions .icon-btn { width: 26px; height: 26px; }
      .dl-item { padding: 10px 12px; gap: 10px; }
      .dl-name { font-size: 13px; }
      .dl-meta { font-size: 11px; }
      .dl-icon-wrap { width: 36px; height: 36px; font-size: 16px; border-radius: 9px; }

      .hist-artist { font-size: 11px; }

    /* ---- 小屏手机 (≤ 380px)：超紧凑 ---- */

      .app { padding: 8px 6px 18px; }
      .top { gap: 4px; }
      .top-actions { gap: 3px; }

      .search::before { font-size: 14px; padding-left: 6px; }

    </div>
    <div class="mode-popover" id="modePopover">
      <button class="mode-option active" data-mode="list"><svg viewBox="0 0 24 24" class="mode-opt-icon"><path d="M4 12a8 8 0 018-8v3.5l4-4-4-4V3a10 10 0 00-10 10h3.5zm16 0a8 8 0 01-8 8v-3.5l-4 4 4 4V21a10 10 0 0010-10h-3.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span>列表循环</span></button>
      <button class="mode-option" data-mode="single"><svg viewBox="0 0 24 24" class="mode-opt-icon"><path d="M4 12a8 8 0 018-8v3.5l4-4-4-4V3a10 10 0 00-10 10h3.5zm16 0a8 8 0 01-8 8v-3.5l-4 4 4 4V21a10 10 0 0010-10h-3.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><text x="12" y="17" text-anchor="middle" font-size="10" fill="currentColor" font-weight="700">1</text></svg><span>单曲循环</span></button>
      <button class="mode-option" data-mode="random"><svg viewBox="0 0 24 24" class="mode-opt-icon"><path d="M3 18l4-4-4-4M8 14h2a5 5 0 005-5V8m3 4l-4 4 4 4m-8-4H8a5 5 0 01-5-5v-1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg><span>随机播放</span></button>
    </div>
  </footer>
  <aside class="play-tools" id="playTools" aria-label="播放设置">
    <div class="tool-row"><label for="volumeRange">音量</label><button class="tool-action" id="muteBtn" type="button">静音</button><input id="volumeRange" type="range" min="0" max="100" value="80" aria-label="音量"></div>
    <div class="tool-row"><label for="sleepTimer">定时关闭</label><select class="tool-select" id="sleepTimer"><option value="0">关闭</option><option value="10">10 分钟</option><option value="20">20 分钟</option><option value="30">30 分钟</option><option value="60">60 分钟</option></select><span id="sleepStatus"></span></div>
    <div class="tool-row"><label>快捷键</label><span>空格播放 / ← → 快退快进</span></div>
  </aside>

  <script>
    (function () {
      var API = '';
      var state = {
        view: 'recommend',
        songs: [],
        searchSongs: [],
        recommendSongs: [],
        recent: load('xym_recent') || [],
        favorite: load('xym_favorite') || [],
        currentIndex: -1,
        playing: false,
        playMode: load('xym_mode') || 'list',
        quality: load('xym_quality') || '740',
        volume: Number(load('xym_volume')),
        sleepTimer: null,
        resume: load('xym_resume'),
        source: { key: 'unified', name: '统一音乐源', files: [] },
        currentPage: 'home'
      };

      if (!Number.isFinite(state.volume)) state.volume = 0.8;

      var modeNames = { list: '列表循环', single: '单曲循环', random: '随机播放' };
      var modeSvgs = {
        // 列表循环：首尾相接的循环箭头
        list: '<path d="M4 12a8 8 0 018-8v3.5l4-4-4-4V3a10 10 0 00-10 10h3.5zm16 0a8 8 0 01-8 8v-3.5l-4 4 4 4V21a10 10 0 0010-10h-3.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><text x="12" y="17" text-anchor="middle" font-size="10" fill="currentColor" font-weight="700"></text>',
        // 单曲循环：循环箭头 + 数字1
        single: '<path d="M4 12a8 8 0 018-8v3.5l4-4-4-4V3a10 10 0 00-10 10h3.5zm16 0a8 8 0 01-8 8v-3.5l-4 4 4 4V21a10 10 0 0010-10h-3.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><text x="12" y="17" text-anchor="middle" font-size="10" fill="currentColor" font-weight="700">1</text>',
        // 随机播放：交叉箭头
        random: '<path d="M3 18l4-4-4-4M8 14h2a5 5 0 005-5V8m3 4l-4 4 4 4m-8-4H8a5 5 0 01-5-5v-1" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>'
      };
      var audio = new Audio();
      audio.preload = 'auto';
      audio.setAttribute('playsinline', '');
      audio.setAttribute('webkit-playsinline', '');
      audio.setAttribute('x5-playsinline', '');
      audio.setAttribute('x-webkit-airplay', 'allow');

      // AudioContext 解锁——修复 iOS Safari / 微信内置浏览器后台播放中断
      var audioCtx = null;
      function unlockAudio() {
        if (!audioCtx) {
          try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (_) {}
        }
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      }
      document.addEventListener('click', unlockAudio);
      document.addEventListener('touchend', unlockAudio);

      // 从微信悬浮窗或其他后台场景返回时，同步界面状态；不强制恢复用户主动暂停的播放。
      document.addEventListener('visibilitychange', function () {
        if (!document.hidden) {
          syncMediaSession();
          if (state.playing && audio.paused && state.resumeAfterInterruption) {
            audio.play().catch(function () {});
          }
        }
      });

      // Media Session API —— 状态栏/锁屏控制 + 后台播放
      if ('mediaSession' in navigator) {
        var setMediaMeta = function (song) {
          if (!song) return;
          navigator.mediaSession.metadata = new MediaMetadata({
            title: song.name || '',
            artist: song.artist || '',
            album: song.album || '',
            artwork: song.pic ? [{ src: imageUrl(song, 256), sizes: '256x256', type: 'image/jpeg' }] : []
          });
        };
        navigator.mediaSession.setActionHandler('play', function () {
          audio.play().then(function () {
            state.playing = true;
            updatePlayButton();
          }).catch(function () {});
        });
        navigator.mediaSession.setActionHandler('pause', function () {
          audio.pause();
          state.playing = false;
          updatePlayButton();
        });
        navigator.mediaSession.setActionHandler('previoustrack', function () {
          prev();
          updatePlayButton();
        });
        navigator.mediaSession.setActionHandler('nexttrack', function () {
          next();
          updatePlayButton();
        });
        navigator.mediaSession.setActionHandler('seekto', function (details) {
          if (details.seekTime != null && Number.isFinite(audio.duration)) {
            audio.currentTime = details.seekTime;
          }
        });
        try { navigator.mediaSession.setActionHandler('seekbackward', function (details) {
          audio.currentTime = Math.max(0, audio.currentTime - (details.seekOffset || 10));
        }); } catch (_) {}
        try { navigator.mediaSession.setActionHandler('seekforward', function (details) {
          if (Number.isFinite(audio.duration)) audio.currentTime = Math.min(audio.duration, audio.currentTime + (details.seekOffset || 10));
        }); } catch (_) {}
        try { navigator.mediaSession.setActionHandler('stop', function () { audio.pause(); audio.currentTime = 0; }); } catch (_) {}
      }

      // 播放状态变化时同步 Media Session
      var syncMediaSession = function () {
        if (!('mediaSession' in navigator)) return;
        navigator.mediaSession.playbackState = audio.paused ? 'paused' : 'playing';
        if (Number.isFinite(audio.duration) && audio.duration > 0) {
          try {
            navigator.mediaSession.setPositionState({
              duration: audio.duration,
              playbackRate: audio.playbackRate,
              position: audio.currentTime
            });
          } catch (_) {}
        }
      };

      var $ = function (id) { return document.getElementById(id); };
      var content = $('content');
      var coverFallback = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#eee3d6"/><text x="50" y="62" text-anchor="middle" font-size="42" fill="#e8873a">♪</text></svg>');

      // 子标签点击
      $('subtabs').addEventListener('click', function (e) {
        var btn = e.target.closest('.subtab');
        if (btn) showCat(Number(btn.dataset.cat));
      });

      content.addEventListener('click', function (event) {
        var target = event.target;
        // 查找最近的可播放行（支持 .song / .hist-item 等所有带 data-index 的行）
        var row = target.closest('[data-index]');
        if (target.classList.contains('like-one')) {
          if (row) {
            var index = Number(row.dataset.index);
            toggleLike(state.songs[index]);
            if (state.view === 'favorite') { renderFavorite(); }
            else if (state.view === 'recent') { renderHistory(); }
            else { renderSongs(state.songs, currentTitle()); }
          }
          return;
        }
        if (target.classList.contains('play-one')) {
          if (row) playAt(Number(row.dataset.index));
          return;
        }
        if (target.id === 'clearRecent') {
          clearRecent();
          return;
        }
        // 点击歌曲行任意位置（排除按钮点击）
        if (row && !event.target.closest('button')) {
          playAt(Number(row.dataset.index));
        }
      });
      // 工作区面板（歌单详情/音乐库分类详情）的点击委托
      $('workspacePanel').addEventListener('click', function (event) {
        var target = event.target;
        var row = target.closest('[data-pl-song-idx]');
        if (!row) row = target.closest('.chart-song[data-index]');
        if (target.classList.contains('play-one-chart') || target.closest('.play-one-chart')) {
          if (row) {
            var idx = row.dataset.plSongIdx !== undefined ? Number(row.dataset.plSongIdx) : Number(row.dataset.index);
            playAt(idx);
          }
          return;
        }
        // 点击行任意位置
        if (row && !event.target.closest('button')) {
          var idx2 = row.dataset.plSongIdx !== undefined ? Number(row.dataset.plSongIdx) : Number(row.dataset.index);
          playAt(idx2);
        }
      });
      content.addEventListener('error', function (event) {
        if (event.target.classList.contains('cover')) {
          event.target.src = coverFallback;
        }
      }, true);
      $('quickGrid').addEventListener('click', function (event) {
        var card = event.target.closest('.quick-card');
        if (card && state.quickSongs) {
          state.songs = state.quickSongs;
          playAt(Number(card.dataset.index));
        }
      });

      function save(key, value) {
        try { localStorage.setItem(key, JSON.stringify(value)); } catch (err) {}
      }

      function saveResume() {
        if (!state.currentSong) return;
        save('xym_resume', { song: state.currentSong, time: audio.currentTime || 0, quality: state.quality });
      }

      function load(key) {
        try {
          var value = localStorage.getItem(key);
          return value ? JSON.parse(value) : null;
        } catch (err) {
          return null;
        }
      }

      function toast(message) {
        var el = $('toast');
        el.textContent = message;
        el.classList.add('show');
        clearTimeout(el._timer);
        el._timer = setTimeout(function () { el.classList.remove('show'); }, 1800);
      }

      function formatTime(value) {
        if (!Number.isFinite(value)) return '00:00';
        var min = Math.floor(value / 60);
        var sec = Math.floor(value % 60);
        return String(min).padStart(2, '0') + ':' + String(sec).padStart(2, '0');
      }

      function imageUrl(song, size) {
        if (!song.pic || !/^https?:/.test(song.pic)) return coverFallback;
        var pic = song.pic;
        // CDN 直连，不经过代理——比代理快 5 倍
        if (pic.indexOf('music.126.net') !== -1 || pic.indexOf('music.163.com') !== -1 || pic.indexOf('kuwo.cn') !== -1) {
          pic += (pic.indexOf('?') === -1 ? '?' : '&') + 'param=' + size + 'y' + size;
          return pic;
        }
        // 其他来源走代理
        return API + '/api/img?url=' + encodeURIComponent(pic);
      }

      function songKey(song) {
        return (song.provider || song.source || 'netease') + ':' + (song.id || '');
      }

      function isLiked(song) {
        return state.favorite.some(function (item) { return songKey(item) === songKey(song); });
      }

      var activeCat = 0;

      function setView(view) {
        state.view = view;
        $('workspacePanel').hidden = true;
        content.style.display = '';
        Array.prototype.forEach.call(document.querySelectorAll('.tab'), function (button) {
          button.classList.toggle('active', button.dataset.view === view);
        });
        $('subtabs').style.display = (view === 'recommend') ? 'flex' : 'none';
        $('homeHero').hidden = view !== 'recommend';
        $('quickSection').hidden = view !== 'recommend';
        if (view === 'recommend') showCat(activeCat);
        if (view === 'search') renderSongs(state.searchSongs, '搜索结果');
        if (view === 'favorite') renderSongs(state.favorite, '我的收藏');
        if (view === 'recent') renderSongs(state.recent, '最近播放');
      }

      function showCat(idx) {
        activeCat = idx;
        var cats = state.categories;
        // 更新子标签高亮
        Array.prototype.forEach.call(document.querySelectorAll('.subtab'), function (btn) {
          btn.classList.toggle('active', Number(btn.dataset.cat) === idx);
        });
        if (!cats || !cats[idx]) {
          content.innerHTML = '<div class="empty">加载中...</div>';
          return;
        }
        var songs = cats[idx].songs || [];
        state.songs = songs;
        renderSongs(songs, cats[idx].name);
      }

      function renderSongs(songs, title) {
        state.songs = songs || [];
        if (!state.songs.length) {
          content.innerHTML = '<div class="empty"><strong>' + title + '</strong><br>暂无歌曲，试试搜索想听的歌。</div>';
          return;
        }

        var extra = '';
        if (state.view === 'recent') {
          extra = '<button class="clear-btn" id="clearRecent">清空历史</button>';
        }
        var html = '<div class="panel-head"><strong>' + title + '</strong><span>' + state.songs.length + ' 首' + extra + '</span></div>';
        html += state.songs.map(function (song, index) {
          var playing = state.currentSong && songKey(state.currentSong) === songKey(song);
          var feedCard = state.view === 'recommend' ? ' soda-card' : '';
          var cover = imageUrl(song, feedCard ? 640 : 80);
          return '<div class="song' + feedCard + (playing ? ' playing' : '') + '" data-index="' + index + '">' +
            '<div class="index">' + (index + 1) + '</div>' +
            '<img class="cover" src="' + cover + '" alt="" loading="lazy" decoding="async">' +
            '<div class="song-main"><div class="song-name">' + escapeHtml(song.name || '未知歌曲') + '</div>' +
            '<div class="song-meta">' + escapeHtml((song.artist || '未知歌手') + (song.album ? ' · ' + song.album : '')) + '</div></div>' +
            '<div class="song-actions">' +
            '<button class="icon-btn play-one" title="播放"><svg viewBox="0 0 24 24">' + (playing && state.playing ? '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>' : '<polygon points="8,5 19,12 8,19"/>') + '</svg></button>' +
            '<button class="icon-btn like-one' + (isLiked(song) ? ' liked' : '') + '" title="收藏"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></button>' +
            '</div></div>';
        }).join('');
        content.innerHTML = html;
      }

      function renderQuickPicks() {
        if (!state.categories || !state.categories.length) return;
        var picked = [];
        state.categories.forEach(function (category) {
          (category.songs || []).slice(0, 2).forEach(function (song) {
            if (picked.length < 6 && !picked.some(function (item) { return songKey(item) === songKey(song); })) picked.push(song);
          });
        });
        state.quickSongs = picked;
        $('quickGrid').innerHTML = picked.map(function (song, index) {
          return '<button class="quick-card" type="button" data-index="' + index + '">' +
            '<img src="' + imageUrl(song, 300) + '" alt="" loading="lazy">' +
            '<strong>' + escapeHtml(song.name || '未知歌曲') + '</strong>' +
            '<small>' + escapeHtml(song.artist || '未知歌手') + '</small></button>';
        }).join('');
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, function (char) {
          return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[char];
        });
      }

      function playAt(index, options) {
        if (index < 0 || index >= state.songs.length) return;
        options = options || {};
        state.currentIndex = index;
        state.currentSong = state.songs[index];
        var song = state.currentSong;
        // 歌词页打开时自动同步
        if ($('lyricOverlay').classList.contains('show')) {
          $('lyricTitle').textContent = song.name || '';
          $('lyricArtist').textContent = song.artist || '';
          $('lyricLike').classList.toggle('liked', isLiked(song));
          fetch(API + '/api/lyric?id=' + encodeURIComponent(song.id))
            .then(function (res) { return res.json(); })
            .then(function (data) {
              state.lyricLines = parseLyric(data.lyric || '');
              renderLyric(state.lyricLines);
              updateLyricHighlight();
            }).catch(function () {});
        }
        var nameText = song.name || '未知歌曲';
        if (nameText.length > 7) {
          $('nowTitle').className = 'now-title scroll';
          $('nowTitle').innerHTML = '<span class="title-inner">' + escapeHtml(nameText) + '</span><span class="title-inner">' + escapeHtml(nameText) + '</span>';
        } else {
          $('nowTitle').className = 'now-title';
          $('nowTitle').textContent = nameText;
        }
        $('nowSub').textContent = (song.artist || '未知歌手');
        $('nowCover').src = imageUrl(song, 160);
        $('nowCover').classList.remove('is-playing');
        $('likeBtn').classList.toggle('liked', isLiked(song));
        if (typeof setMediaMeta === 'function') setMediaMeta(song);
        addRecent(song);

        var streamUrl = API + '/api/stream?id=' + encodeURIComponent(song.id) + '&quality=' + state.quality + '&provider=' + encodeURIComponent(song.provider || song.source || 'netease') + '&name=' + encodeURIComponent(song.name || '') + '&artist=' + encodeURIComponent(song.artist || '');
        audio.pause();
        audio.src = streamUrl;
        applyPlayMode();
        var retryCount = 0;
        function tryPlay() {
          unlockAudio();
          audio.play().then(function () {
            state.playing = true;
            updatePlayButton();
            if (retryCount === 0) toast('正在播放：' + song.name);
            // 更新列表中的播放/暂停按钮
            var prev = content.querySelector('.song.playing');
            if (prev) { prev.classList.remove('playing'); updateRowPlayBtn(prev, false); }
            var cur = content.querySelector('.song[data-index="' + index + '"]');
            if (cur) { cur.classList.add('playing'); updateRowPlayBtn(cur, true); }
          }).catch(function () {
            retryCount++;
            if (retryCount <= 5) {
              // 微信悬浮窗/息屏：play() 可能被拒，递增重试
              setTimeout(tryPlay, retryCount * 600);
            } else {
              state.playing = false;
              updatePlayButton();
              toast('播放失败，自动尝试下一首');
              setTimeout(next, 500);
            }
          });
        }
        if (options.autoplay !== false) tryPlay();
      }

      function currentTitle() {
        if (state.view === 'recommend') return '推荐歌曲';
        if (state.view === 'favorite') return '我的收藏';
        if (state.view === 'recent') return '最近播放';
        return '搜索结果';
      }

      function togglePlay() {
        if (!audio.src) {
          if (state.songs.length) playAt(0);
          return;
        }
        if (audio.paused) audio.play().then(function () { state.playing = true; updatePlayButton(); syncMediaSession(); }).catch(function () { toast('浏览器需要一次用户点击后才能继续播放'); });
        else {
          audio.pause();
          state.playing = false;
          updatePlayButton();
          syncMediaSession();
        }
        // 同步歌曲列表中的播放按钮状态
        var row = content.querySelector('.song.playing');
        if (row) updateRowPlayBtn(row, state.playing);
      }

      function updatePlayButton() {
        var icon = audio.paused
          ? '<polygon points="8,5 19,12 8,19"/>'
          : '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';
        $('playIcon').innerHTML = icon;
        $('nowCover').classList.toggle('is-playing', !audio.paused);
        updateLyricPlayBtn();
        updateVinylState();
      }
      var vinylRecord = document.getElementById('vinylRecord');
      function updateVinylState() {
        if (vinylRecord) vinylRecord.classList.toggle('paused', audio.paused);
      }

      function updateRowPlayBtn(row, isPlaying) {
        var btn = row.querySelector('.play-one svg');
        if (btn) {
          btn.innerHTML = isPlaying
            ? '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>'
            : '<polygon points="8,5 19,12 8,19"/>';
        }
      }

      function next() {
        if (!state.songs.length) return;
        if (state.playMode === 'random') {
          var idx;
          do { idx = Math.floor(Math.random() * state.songs.length); }
          while (state.songs.length > 1 && idx === state.currentIndex);
          playAt(idx);
          return;
        }
        // 列表循环和单曲循环：下一首（单曲循环用 audio.loop 实现）
        playAt((state.currentIndex + 1 + state.songs.length) % state.songs.length);
      }

      function applyPlayMode() {
        // 单曲循环用浏览器原生 loop 属性，最可靠
        audio.loop = (state.playMode === 'single');
      }

      function prev() {
        if (!state.songs.length) return;
        if (audio.currentTime > 3) {
          audio.currentTime = 0;
          return;
        }
        playAt((state.currentIndex - 1 + state.songs.length) % state.songs.length);
      }

      function toggleLike(song) {
        if (!song) return;
        if (isLiked(song)) {
          state.favorite = state.favorite.filter(function (item) { return songKey(item) !== songKey(song); });
          toast('已取消收藏');
        } else {
          state.favorite.unshift(song);
          toast('已收藏');
        }
        save('xym_favorite', state.favorite);
        if (state.currentSong && songKey(state.currentSong) === songKey(song)) {
          $('likeBtn').classList.toggle('liked', isLiked(song));
        }
      }

      function addRecent(song) {
        song.playedAt = Date.now();
        state.recent = state.recent.filter(function (item) { return songKey(item) !== songKey(song); });
        state.recent.unshift(song);
        state.recent = state.recent.slice(0, 60);
        save('xym_recent', state.recent);
      }

      function clearRecent() {
        state.recent = [];
        save('xym_recent', []);
        toast('播放历史已清空');
        if (state.view === 'recent') renderSongs([], '最近播放');
      }

      function parseLyric(raw) {
        if (!raw) return [];
        var lines = raw.split('\n');
        var parsed = [];
        var timeRe = /\[(\d{2}):(\d{2})([.:]\d{1,3})?\]/g;
        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];
          var text = line.replace(timeRe, '').trim();
          if (!text) continue;
          timeRe.lastIndex = 0;
          var match;
          var hasTime = false;
          // 每个时间标签独立生成一条记录
          while ((match = timeRe.exec(line)) !== null) {
            hasTime = true;
            var mins = parseInt(match[1], 10);
            var ms = match[3] ? parseFloat('0' + match[3].replace(':', '.')) : 0;
            var secs = parseInt(match[2], 10) + ms;
            parsed.push({ time: mins * 60 + secs, text: text });
          }
          if (!hasTime) parsed.push({ time: -1, text: text });
        }
        // 按时间排序确保逐行对齐
        parsed.sort(function (a, b) { return a.time - b.time; });
        return parsed;
      }

      function renderLyric(lines) {
        if (!lines.length) {
          $('lyricBody').innerHTML = '<div class="lyric-empty">暂无歌词</div>';
          return;
        }
        $('lyricBody').innerHTML = lines.map(function (line, i) {
          return '<div class="lyric-line" data-idx="' + i + '">' + escapeHtml(line.text) + '</div>';
        }).join('');
      }

      function updateLyricHighlight() {
        if (!state.lyricLines || !state.lyricLines.length) return;
        var time = audio.currentTime || 0;
        var idx = -1;
        for (var i = 0; i < state.lyricLines.length; i++) {
          if (state.lyricLines[i].time >= 0 && state.lyricLines[i].time <= time) {
            idx = i;
          } else if (state.lyricLines[i].time > time) {
            break;
          }
        }
        var active = $('lyricBody').querySelector('.lyric-line.active');
        if (active) active.classList.remove('active');
        if (idx >= 0) {
          var el = $('lyricBody').querySelector('.lyric-line[data-idx="' + idx + '"]');
          if (el) {
            el.classList.add('active');
            // 用户手动滚动时暂停自动滚动 4 秒
            if (!state._lyricUserScroll || Date.now() - state._lyricUserScroll > 4000) {
              var bodyEl = $('lyricBody');
              bodyEl.scrollTop = el.offsetTop - bodyEl.clientHeight / 2 + el.clientHeight / 2;
            }
          }
        }
      }

      function showLyric() {
        var song = state.currentSong;
        if (!song) {
          toast('请先播放一首歌');
          return;
        }
        $('lyricTitle').textContent = song.name || '歌曲';
        $('lyricArtist').textContent = song.artist || '';
        $('lyricBody').textContent = '加载中...';
        $('lyricLike').classList.toggle('liked', isLiked(song));
        updateLyricPlayBtn();
        $('lyricOverlay').classList.add('show');
        document.body.style.overflow = 'hidden';
        // 监听用户手动滚动
        state._lyricUserScroll = 0;
        $('lyricBody').onscroll = function () { state._lyricUserScroll = Date.now(); };

        fetch(API + '/api/lyric?id=' + encodeURIComponent(song.id))
          .then(function (res) { return res.json(); })
          .then(function (data) {
            state.lyricLines = parseLyric(data.lyric || '');
            renderLyric(state.lyricLines);
            updateLyricHighlight();
            if (state.lyricTimer) clearInterval(state.lyricTimer);
            state.lyricTimer = setInterval(updateLyricHighlight, 500);
          })
          .catch(function () {
            state.lyricLines = [];
            $('lyricBody').innerHTML = '<div class="lyric-empty">歌词加载失败</div>';
          });
      }

      function updateLyricPlayBtn() {
        var icon = $('lyricPlayIcon');
        if (icon) {
          icon.innerHTML = audio.paused
            ? '<polygon points="8,5 19,12 8,19"/>'
            : '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>';
        }
      }

      function hideLyric() {
        $('lyricOverlay').classList.remove('show');
        document.body.style.overflow = '';
        if (state.lyricTimer) { clearInterval(state.lyricTimer); state.lyricTimer = null; }
      }

      function search(keyword) {
        keyword = keyword.trim();
        if (!keyword) return;
        setView('search');
        showSkeleton();
        fetch(API + '/api/search?keyword=' + encodeURIComponent(keyword))
          .then(function (res) { return res.json(); })
          .then(function (songs) {
            if (!Array.isArray(songs)) throw new Error(songs.error || '搜索失败');
            state.searchSongs = songs;
            renderSongs(state.searchSongs, '搜索结果（共' + songs.length + '首）');
          })
          .catch(function (error) {
            content.innerHTML = '<div class="empty"><strong>搜索失败</strong><br>' + escapeHtml(error.message) + '</div>';
          });
      }

      function showSkeleton() {
        var s = '';
        for (var i = 0; i < 8; i++) {
          s += '<div class="skeleton"><div class="skeleton-cover"></div><div style="flex:1;min-width:0"><div class="skeleton-text long"></div><div class="skeleton-text short"></div></div></div>';
        }
        content.innerHTML = s;
      }

      function loadRecommend() {
        showSkeleton();
        fetch(API + '/api/categories')
          .then(function (res) { return res.json(); })
          .then(function (cats) {
            if (!Array.isArray(cats) || !cats.length) throw new Error('加载失败');
            state.categories = cats;
            renderQuickPicks();
            if (state.view === 'recommend') showCat(0);
            // 如果当前在音乐库页面，刷新音乐库
            if (state.currentPage === 'library') renderLibrary();
            if (state.currentPage === 'charts') showCat(activeCat);
          })
          .catch(function () {
            if (state.view !== 'recommend') return;
            var kw = '抖音热歌';
            fetch(API + '/api/search?keyword=' + encodeURIComponent(kw))
              .then(function (res) { return res.json(); })
              .then(function (songs) {
                if (!Array.isArray(songs)) throw new Error('加载失败');
                state.searchSongs = songs;
                state.songs = songs;
                renderSongs(songs, '推荐歌曲');
              })
              .catch(function () {
                content.innerHTML = '<div class="empty"><strong>推荐歌曲加载失败</strong><br>请检查网络后刷新页面重试</div>';
              });
          });

        content.style.display = 'none';
        $('workspacePanel').hidden = false;
        $('workspacePanel').innerHTML = '<div class="workspace-icon">' + icon + '</div><h2>' + title + '</h2><p>' + message + '</p>';

      function setWorkspace(page) {
        state.currentPage = page;
        Array.prototype.forEach.call(document.querySelectorAll('.side-link[data-page]'), function (button) {
          button.classList.toggle('active', button.dataset.page === page);
        });

        $('quickSection').hidden = true;

        content.style.display = 'none';

        if (page === 'downloads') { renderDownloads(); return; }
        showWorkspaceMessage('设置', '⚙', '播放模式、音质、音量、定时暂停和歌词主题均可在底部播放器中调整，设置会保存在当前浏览器。');

        $('workspacePanel').hidden = true;
        state.view = 'recent';
        state.songs = state.recent;
        var html = '<div class="page-header" style="margin-bottom:14px;"><div class="page-header-icon" style="background:rgba(160,140,220,.13);color:#a08cdc">◷</div><div><h2>历史播放</h2><p>' + state.recent.length + ' 首最近听过的歌曲</p></div>';
        if (state.recent.length) html += '<button class="clear-btn" id="clearRecentHist" style="margin-left:auto;">清空历史</button>';
        html += '</div>';
        if (!state.recent.length) {
          html += '<div class="panel" style="text-align:center;padding:50px 20px;color:var(--desk-muted);"><div style="font-size:56px;margin-bottom:12px;opacity:.45;">◷</div><strong>暂无播放历史</strong><br>开始播放歌曲，这里会记录你的聆听足迹</div>';
        } else {
          html += '<div class="panel" style="padding:8px;"><div class="history-list">';
          var now = Date.now();
          html += state.recent.map(function (song, index) {
            var playing = state.currentSong && songKey(state.currentSong) === songKey(song);
            var cover = imageUrl(song, 80);
            var timeLabel = '';
            if (song.playedAt) {
              var diff = now - song.playedAt;
              if (diff < 3600000) timeLabel = Math.floor(diff / 60000) + ' 分钟前';
              else if (diff < 86400000) timeLabel = Math.floor(diff / 3600000) + ' 小时前';
              else timeLabel = Math.floor(diff / 86400000) + ' 天前';
            }
            return '<div class="hist-item' + (playing ? ' playing' : '') + '" data-index="' + index + '">' +
              '<div class="hist-dot"></div>' +
              '<img src="' + cover + '" alt="" loading="lazy">' +
              '<div><div class="hist-name">' + escapeHtml(song.name || '未知歌曲') + '</div><div class="hist-artist">' + escapeHtml(song.artist || '未知歌手') + (timeLabel ? ' · ' + timeLabel : '') + '</div></div>' +
              '<div class="hist-actions"><button class="icon-btn play-one" title="播放"><svg viewBox="0 0 24 24">' + (playing && state.playing ? '<rect x="6" y="5" width="4" height="14"/><rect x="14" y="5" width="4" height="14"/>' : '<polygon points="8,5 19,12 8,19"/>') + '</svg></button></div>' +
